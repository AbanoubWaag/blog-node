<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog – Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <a href="/" style="font-weight:700;font-size:1.1rem">Blog</a>
  <div id="nav-auth"></div>
</nav>
<div class="container">
  <form id="login-form">
    <h1>Login</h1>
    <div id="alert"></div>
    <div class="field"><label>Email</label><input type="email" id="email" required></div>
    <div class="field"><label>Password</label><input type="password" id="password" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    <p style="margin-top:1rem;font-size:.85rem">No account? <a href="/pages/register.html">Register</a></p>
  </form>
</div>
<script src="/js/api.js"></script>
<script>
  renderNav();
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('alert');
    alertEl.innerHTML = '';
    try {
      const data = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/';
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  });
</script>
</body>
</html>
