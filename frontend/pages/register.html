<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog – Register</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <a href="/" style="font-weight:700;font-size:1.1rem">Blog</a>
  <div id="nav-auth"></div>
</nav>
<div class="container">
  <form id="register-form">
    <h1>Register</h1>
    <div id="alert"></div>
    <div class="field"><label>Name</label><input type="text" id="name" required></div>
    <div class="field"><label>Email</label><input type="email" id="email" required></div>
    <div class="field"><label>Password</label><input type="password" id="password" required minlength="6"></div>
    <div class="field">
      <label>Register as Admin?</label>
      <input type="checkbox" id="is-admin" style="width:auto;margin-top:.4rem">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Register</button>
    <p style="margin-top:1rem;font-size:.85rem">Already have an account? <a href="/pages/login.html">Login</a></p>
  </form>
</div>
<script src="/js/api.js"></script>
<script>
  renderNav();
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('alert');
    alertEl.innerHTML = '';
    try {
      const data = await api('/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          role: document.getElementById('is-admin').checked ? 'admin' : 'user',
        }),
      });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/';
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  });
</script>
</body>
</html>
